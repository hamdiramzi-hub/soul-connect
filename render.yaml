databases:
  - name: soul-connect-db
    plan: free

services:
  - type: web
    name: soul-connect
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: soul-connect-db
          property: connectionString
