databases:
  - name: cosmic-dating-db
    plan: free

services:
  - type: web
    name: cosmic-dating
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: cosmic-dating-db
          property: connectionString
